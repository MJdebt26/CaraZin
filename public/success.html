<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed · CARAZIN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--off:#f7f7f5;--black:#0a0a0a;--mid:#9a9a96;--light:#e8e8e5;--gold:#b8944a;--white:#fff}
  body{background:var(--off);color:var(--black);font-family:'Inter',sans-serif;font-weight:300;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{background:var(--white);max-width:520px;width:100%;padding:3rem 2.6rem;
    box-shadow:0 30px 80px rgba(0,0,0,.08);border:1px solid var(--light)}
  .eyebrow{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold)}
  h1{font-size:2rem;font-weight:300;margin:1rem 0 .4rem;letter-spacing:-.01em}
  .sub{color:var(--mid);font-size:.86rem;line-height:1.7}
  .oid{font-family:'DM Mono',monospace;font-size:.9rem;letter-spacing:.1em;margin:1.8rem 0;
    padding:1rem;background:var(--off);border:1px dashed var(--light);text-align:center}
  .items{margin:1.8rem 0;border-top:1px solid var(--light)}
  .row{display:flex;justify-content:space-between;padding:.8rem 0;border-bottom:1px solid var(--light);font-size:.84rem}
  .row .q{color:var(--mid);font-family:'DM Mono',monospace;font-size:.7rem}
  .tot{display:flex;justify-content:space-between;font-weight:600;margin-top:1.2rem;font-size:1rem}
  .status{display:inline-block;font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.16em;
    text-transform:uppercase;padding:.35rem .8rem;border-radius:2px;background:#1f4d2e;color:#fff;margin-top:.6rem}
  a.home{display:inline-block;margin-top:2rem;font-family:'DM Mono',monospace;font-size:.62rem;
    letter-spacing:.2em;text-transform:uppercase;color:#fff;background:var(--black);
    padding:1rem 2rem;text-decoration:none;transition:background .25s}
  a.home:hover{background:var(--gold)}
  .muted{color:var(--mid);font-size:.74rem;margin-top:1.4rem;line-height:1.6}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="eyebrow">CaraZin · Vancouver</div>
    <h1>Loading order…</h1>
  </div>
<script>
  const id = new URLSearchParams(location.search).get('order');
  const card = document.getElementById('card');
  const money = (n) => '$' + Number(n).toFixed(2);

  async function run() {
    if (!id) { card.innerHTML = '<div class="eyebrow">CaraZin</div><h1>No order found</h1>'; return; }
    try {
      const res = await fetch('/api/checkout/order/' + encodeURIComponent(id));
      if (!res.ok) throw new Error();
      const o = await res.json();
      const items = o.items.map((i) =>
        `<div class="row"><span>${i.name} <span class="q">×${i.qty}</span></span><span>${money(i.price * i.qty)}</span></div>`
      ).join('');
      card.innerHTML = `
        <div class="eyebrow">Order confirmed</div>
        <h1>Thank you.</h1>
        <p class="sub">We've received your order and emailed a confirmation. Most Metro Vancouver orders arrive in 2–3 days.</p>
        <div class="status">${o.status === 'paid' ? 'Payment received' : o.status}</div>
        <div class="oid">${o.id}</div>
        <div class="items">${items}</div>
        <div class="row"><span>Shipping</span><span>${o.shipping === 0 ? 'Free' : money(o.shipping)}</span></div>
        <div class="tot"><span>Total</span><span>${money(o.total)}</span></div>
        <p class="muted">Keep your order number <strong>${o.id}</strong> for any questions — reach us at hello@carazin.ca.</p>
        <a class="home" href="/">Continue shopping</a>`;
    } catch {
      card.innerHTML = '<div class="eyebrow">CaraZin</div><h1>Order not found</h1><p class="sub">We couldn\'t locate that order. Contact hello@carazin.ca.</p><a class="home" href="/">Back to store</a>';
    }
  }
  run();
</script>
</body>
</html>
