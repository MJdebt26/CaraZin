<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaraZin · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--off:#f7f7f5;--black:#0a0a0a;--mid:#9a9a96;--light:#e8e8e5;--gold:#b8944a;--white:#fff;--dark:#2a2a2a}
  body{background:var(--off);color:var(--black);font-family:'Inter',sans-serif;font-weight:300;font-size:14px}
  .mono{font-family:'DM Mono',monospace}
  button{cursor:pointer;font-family:inherit}
  input,select,textarea{font-family:inherit}

  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center}
  #login .box{background:var(--white);padding:3rem 2.6rem;width:360px;border:1px solid var(--light);box-shadow:0 30px 80px rgba(0,0,0,.08)}
  .eyebrow{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold)}
  h1{font-weight:300;letter-spacing:-.01em}
  .field{margin:1.2rem 0}
  label{display:block;font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:.4rem}
  .inp{width:100%;padding:.7rem .8rem;border:1px solid var(--light);background:var(--white);font-size:.85rem}
  .inp:focus{outline:none;border-color:var(--dark)}
  .btn{background:var(--black);color:#fff;border:none;padding:.9rem 1.4rem;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;transition:background .2s}
  .btn:hover{background:var(--gold)}
  .btn.sm{padding:.5rem .9rem;font-size:.54rem}
  .btn.ghost{background:none;color:var(--mid);border:1px solid var(--light)}
  .btn.ghost:hover{background:var(--off);color:var(--black)}
  .err{color:#7a2222;font-size:.78rem;margin-top:.8rem;min-height:1rem}

  /* app */
  #app{display:none}
  header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;background:var(--white);border-bottom:1px solid var(--light)}
  .logo{font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:1rem}
  nav.tabs{display:flex;gap:.4rem;padding:1rem 2rem 0}
  .tab{background:none;border:none;padding:.7rem 1.1rem;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);border-bottom:2px solid transparent}
  .tab.active{color:var(--black);border-bottom-color:var(--gold)}
  main{padding:1.5rem 2rem 4rem}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
  .stat{background:var(--white);border:1px solid var(--light);padding:1.3rem}
  .stat .n{font-size:1.8rem;font-weight:300}
  .stat .l{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-top:.3rem}
  table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--light)}
  th,td{text-align:left;padding:.8rem 1rem;border-bottom:1px solid var(--light);font-size:.8rem;vertical-align:middle}
  th{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);font-weight:500}
  tr:last-child td{border-bottom:none}
  .pill{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;padding:.25rem .6rem;border-radius:2px;background:var(--light);color:var(--dark)}
  .pill.paid{background:#1f4d2e;color:#fff}.pill.pending{background:#7a5a1f;color:#fff}
  .pill.shipped,.pill.fulfilled{background:#1f3d5a;color:#fff}.pill.cancelled,.pill.refunded{background:#7a2222;color:#fff}
  .right{text-align:right}
  .row-actions{display:flex;gap:.4rem;flex-wrap:wrap}
  select.status{padding:.35rem;font-size:.7rem;border:1px solid var(--light)}
  /* modal */
  #modal{position:fixed;inset:0;background:rgba(10,10,10,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:1rem}
  #modal .panel{background:var(--white);width:560px;max-width:100%;max-height:90vh;overflow:auto;padding:2rem}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .grid2 .full{grid-column:1/-1}
  textarea.inp{min-height:70px;resize:vertical}
  .muted{color:var(--mid);font-size:.76rem}
  .flex{display:flex;align-items:center;gap:.6rem}
  .spacer{flex:1}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="eyebrow">CaraZin</div>
    <h1>Admin</h1>
    <div class="field">
      <label>Password</label>
      <input class="inp" id="pw" type="password" autofocus>
    </div>
    <button class="btn" id="loginBtn" style="width:100%">Sign in</button>
    <div class="err" id="loginErr"></div>
    <p class="muted" style="margin-top:1rem">Default password is <code>admin</code> — set <code>ADMIN_PASSWORD</code> in .env.</p>
  </div>
</div>

<div id="app">
  <header>
    <span class="logo">CaraZin</span>
    <div class="flex">
      <a class="btn ghost sm" href="/" target="_blank">View store ↗</a>
      <button class="btn ghost sm" id="logoutBtn">Log out</button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab active" data-tab="orders">Orders</button>
    <button class="tab" data-tab="products">Products</button>
    <button class="tab" data-tab="subscribers">Subscribers</button>
  </nav>
  <main>
    <div class="stats" id="stats"></div>
    <div id="view"></div>
  </main>
</div>

<div id="modal"><div class="panel" id="modalPanel"></div></div>

<script>
const $ = (s) => document.querySelector(s);
const api = async (path, opts = {}) => {
  const res = await fetch('/api/admin' + path, {
    headers: { 'Content-Type': 'application/json' }, ...opts,
  });
  if (res.status === 401) { showLogin(); throw new Error('unauthorized'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
};
const money = (n) => '$' + Number(n).toFixed(2);
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

// ── Auth ──
function showLogin() { $('#login').style.display = 'flex'; $('#app').style.display = 'none'; }
function showApp() { $('#login').style.display = 'none'; $('#app').style.display = 'block'; loadStats(); switchTab('orders'); }

$('#loginBtn').onclick = async () => {
  $('#loginErr').textContent = '';
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: $('#pw').value }),
    });
    if (!res.ok) { $('#loginErr').textContent = 'Incorrect password'; return; }
    showApp();
  } catch { $('#loginErr').textContent = 'Login failed'; }
};
$('#pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#loginBtn').click(); });
$('#logoutBtn').onclick = async () => { await fetch('/api/admin/logout', { method: 'POST' }); showLogin(); };

// ── Stats ──
async function loadStats() {
  try {
    const s = await api('/stats');
    $('#stats').innerHTML = [
      ['Revenue', money(s.revenue)], ['Orders', s.orders], ['Paid', s.paidOrders],
      ['Products', s.products], ['Subscribers', s.subscribers],
    ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
  } catch {}
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'orders') renderOrders();
  if (tab === 'products') renderProducts();
  if (tab === 'subscribers') renderSubscribers();
}
document.querySelectorAll('.tab').forEach((t) => t.onclick = () => switchTab(t.dataset.tab));

// ── Orders ──
const STATUSES = ['pending','paid','fulfilled','shipped','cancelled','refunded'];
async function renderOrders() {
  const orders = await api('/orders');
  if (!orders.length) { $('#view').innerHTML = '<p class="muted">No orders yet.</p>'; return; }
  $('#view').innerHTML = `<table><thead><tr>
    <th>Order</th><th>Customer</th><th>Items</th><th class="right">Total</th><th>Status</th><th>Date</th>
  </tr></thead><tbody>${orders.map((o) => `
    <tr>
      <td class="mono">${o.id}</td>
      <td>${esc(o.customer_name) || '—'}<br><span class="muted">${esc(o.email)}</span></td>
      <td><button class="btn ghost sm" onclick="viewOrder('${o.id}')">View</button></td>
      <td class="right">${money(o.total_cents / 100)}</td>
      <td><select class="status" onchange="setStatus('${o.id}', this.value)">
        ${STATUSES.map((s) => `<option ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}
      </select></td>
      <td class="muted">${o.created_at}</td>
    </tr>`).join('')}</tbody></table>`;
}
async function setStatus(id, status) { await api('/orders/' + id + '/status', { method: 'PUT', body: JSON.stringify({ status }) }); loadStats(); }
async function viewOrder(id) {
  const o = await api('/orders/' + id);
  openModal(`
    <div class="flex"><h1 style="font-size:1.3rem">Order ${o.id}</h1><div class="spacer"></div><span class="pill ${o.status}">${o.status}</span></div>
    <p class="muted" style="margin:.6rem 0 1.2rem">${o.created_at}</p>
    <table><tbody>${o.items.map((i) => `<tr><td>${esc(i.name)} <span class="muted">×${i.qty}</span></td><td class="right">${money(i.price_cents * i.qty / 100)}</td></tr>`).join('')}
      <tr><td>Shipping</td><td class="right">${o.shipping_cents === 0 ? 'Free' : money(o.shipping_cents / 100)}</td></tr>
      <tr><td><strong>Total</strong></td><td class="right"><strong>${money(o.total_cents / 100)}</strong></td></tr>
    </tbody></table>
    <h1 style="font-size:.9rem;margin:1.4rem 0 .6rem">Ship to</h1>
    <p class="muted">${esc(o.customer_name) || ''}<br>${esc(o.email)}${o.phone ? ' · ' + esc(o.phone) : ''}<br>
      ${esc(o.address_line1) || ''} ${esc(o.address_line2) || ''}<br>
      ${esc(o.city) || ''} ${esc(o.province) || ''} ${esc(o.postal_code) || ''} ${esc(o.country) || ''}</p>
    <div style="margin-top:1.6rem;text-align:right"><button class="btn ghost" onclick="closeModal()">Close</button></div>`);
}

// ── Products ──
async function renderProducts() {
  const products = await api('/products');
  $('#view').innerHTML = `
    <div class="flex" style="margin-bottom:1rem"><div class="spacer"></div><button class="btn" onclick="editProduct()">+ New product</button></div>
    <table><thead><tr><th>Name</th><th>Slug</th><th>Category</th><th class="right">Price</th><th class="right">Stock</th><th>Active</th><th></th></tr></thead>
    <tbody>${products.map((p) => `
      <tr>
        <td>${esc(p.name)}${p.badge ? ` <span class="pill">${esc(p.badge)}</span>` : ''}</td>
        <td class="mono muted">${esc(p.slug)}</td>
        <td>${esc(p.category)}</td>
        <td class="right">${money(p.price_cents / 100)}</td>
        <td class="right">${p.stock}</td>
        <td>${p.active ? '✓' : '—'}</td>
        <td class="row-actions">
          <button class="btn ghost sm" onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
          <button class="btn ghost sm" onclick="delProduct(${p.id})">Delete</button>
        </td>
      </tr>`).join('')}</tbody></table>`;
}
function editProduct(p) {
  const isNew = !p;
  p = p || { name:'', slug:'', description:'', price_cents:0, category:'accessories', badge:'', fitment:'', stock:100, active:1, sort:0 };
  openModal(`
    <h1 style="font-size:1.3rem;margin-bottom:1.2rem">${isNew ? 'New product' : 'Edit product'}</h1>
    <div class="grid2">
      <div class="full"><label>Name</label><input class="inp" id="f_name" value="${esc(p.name)}"></div>
      <div><label>Slug</label><input class="inp" id="f_slug" value="${esc(p.slug)}"></div>
      <div><label>Category</label><input class="inp" id="f_category" value="${esc(p.category)}"></div>
      <div><label>Price (CAD)</label><input class="inp" id="f_price" type="number" step="0.01" value="${(p.price_cents/100).toFixed(2)}"></div>
      <div><label>Stock</label><input class="inp" id="f_stock" type="number" value="${p.stock}"></div>
      <div><label>Badge</label><input class="inp" id="f_badge" value="${esc(p.badge)}"></div>
      <div><label>Sort</label><input class="inp" id="f_sort" type="number" value="${p.sort || 0}"></div>
      <div class="full"><label>Fitment</label><input class="inp" id="f_fitment" value="${esc(p.fitment)}"></div>
      <div class="full"><label>Description</label><textarea class="inp" id="f_desc">${esc(p.description)}</textarea></div>
      <div class="full"><label><input type="checkbox" id="f_active" ${p.active ? 'checked' : ''}> Active (visible in store)</label></div>
    </div>
    <div class="err" id="f_err"></div>
    <div class="flex" style="margin-top:1.4rem"><button class="btn ghost" onclick="closeModal()">Cancel</button><div class="spacer"></div>
      <button class="btn" onclick="saveProduct(${isNew ? 'null' : p.id})">Save</button></div>`);
}
async function saveProduct(id) {
  const body = {
    name: $('#f_name').value.trim(),
    slug: $('#f_slug').value.trim(),
    category: $('#f_category').value.trim(),
    price_cents: Math.round(parseFloat($('#f_price').value) * 100),
    stock: parseInt($('#f_stock').value, 10),
    badge: $('#f_badge').value.trim() || null,
    sort: parseInt($('#f_sort').value, 10) || 0,
    fitment: $('#f_fitment').value.trim() || null,
    description: $('#f_desc').value.trim(),
    active: $('#f_active').checked,
  };
  try {
    if (id) await api('/products/' + id, { method: 'PUT', body: JSON.stringify(body) });
    else await api('/products', { method: 'POST', body: JSON.stringify(body) });
    closeModal(); renderProducts(); loadStats();
  } catch (e) { $('#f_err').textContent = e.message; }
}
async function delProduct(id) {
  if (!confirm('Delete this product?')) return;
  await api('/products/' + id, { method: 'DELETE' }); renderProducts(); loadStats();
}

// ── Subscribers ──
async function renderSubscribers() {
  const subs = await api('/subscribers');
  if (!subs.length) { $('#view').innerHTML = '<p class="muted">No subscribers yet.</p>'; return; }
  $('#view').innerHTML = `<table><thead><tr><th>Email</th><th>Joined</th></tr></thead>
    <tbody>${subs.map((s) => `<tr><td>${esc(s.email)}</td><td class="muted">${s.created_at}</td></tr>`).join('')}</tbody></table>`;
}

// ── Modal ──
function openModal(html) { $('#modalPanel').innerHTML = html; $('#modal').style.display = 'flex'; }
function closeModal() { $('#modal').style.display = 'none'; }
$('#modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });

// ── Boot ──
(async () => {
  try { const s = await fetch('/api/admin/session').then((r) => r.json()); if (s.authed) showApp(); else showLogin(); }
  catch { showLogin(); }
})();
</script>
</body>
</html>
